<div class="login-container">
  <header class="main-title animado">
    Novo Simulado
  </header>

  <div class="login-card questao-card">
    <form (ngSubmit)="salvarSimulado()">
      
      <div class="input-group">
        <label class="label-principal">Título do Simulado</label>
        <input type="text" [(ngModel)]="simulado.titulo" name="titulo" placeholder="Ex: Simulado Geral">
      </div>

      <div class="input-group">
        <label class="label-principal">Enunciado da Questão</label>
        <textarea [(ngModel)]="questao.texto" name="enunciado" rows="2" placeholder="Digite aqui..."></textarea>
      </div>

      <div class="alternativas-section">
        <label class="label-principal">Alternativas (A a D)</label>
        <div *ngFor="let alt of alternativas; let i = index" class="alternativa-row">
          <span class="letra-label">{{ ['A','B','C','D'][i] }}</span>
          <input type="text" [(ngModel)]="alt.texto" [name]="'alt'+i" placeholder="Texto...">
          <input type="radio" [value]="i" [(ngModel)]="questao.correta_index" name="correta">
        </div>
      </div>

      <button type="submit" class="btn-entrar">Salvar Simulado</button>

      <div class="opcoes-extras">
        <a (click)="voltar()" class="link-voltar">← Voltar para Gestão</a>
      </div>
    </form>
  </div>

  <footer class="footer-copy">
    © 2026 - ULBRA
  </footer>
</div>
