<div class="login-container">
  <header class="page-header">
    <h1 class="main-title animado">Novo Professor</h1>
  </header>

  <main class="login-card">
    <header class="card-header">
      <img src="assets/logo-ulbra.png" alt="Logo Ulbra" class="logo-ulbra">
    </header>

    <form (ngSubmit)="salvarProfessor()">
      <div class="input-group">
        <label for="nome">Nome Completo</label>
        <input type="text" id="nome" [(ngModel)]="professor.nome" name="nome" placeholder="Nome do professor" required>
      </div>

      <div class="input-group">
        <label for="email">E-mail Institucional</label>
        <input type="email" id="email" [(ngModel)]="professor.email" name="email" placeholder="professor@ulbra.br" required>
      </div>

      <div class="input-group">
        <label for="senha">Senha Inicial</label>
        <input type="password" id="senha" [(ngModel)]="professor.senha" name="senha" placeholder="Crie uma senha" required>
      </div>

      <div class="input-group">
        <label for="especialidade">Especialidade</label>
        <input type="text" id="especialidade" [(ngModel)]="professor.especialidade" name="especialidade" placeholder="Ex: Anatomia, Cardiologia" required>
      </div>

      <div class="actions">
        <button type="submit" class="btn-entrar">Cadastrar Docente</button>
      </div>
    </form>

    <footer class="opcoes-extras">
      <nav class="nav-links">
        <a routerLink="/home" class="link-voltar">Voltar ao Painel</a>
      </nav>
    </footer>
  </main>
</div>
