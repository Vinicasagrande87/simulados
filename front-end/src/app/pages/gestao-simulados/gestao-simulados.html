<div class="login-container">
  <header class="page-header">
    <h1 class="main-title animado">Gestão de Simulados</h1>
  </header>

  <main class="login-card gestao-card">
    <div class="header-acoes">
      <p class="subtitulo">Gerencie os simulados do sistema.</p>
      <button class="btn-novo" routerLink="/novo-simulado">
        + Novo Simulado
      </button>
    </div>

    <div class="table-responsive">
      <table class="simulados-table">
        <thead>
          <tr>
            <th>Título</th>
            <th>Questões</th>
            <th>Data</th>
            <th class="text-center">Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let simulado of simulados">
            <td>{{ simulado.titulo }}</td>
            <td>{{ simulado.questoes_count }}</td>
            <td>{{ simulado.data_criacao | date:'dd/MM/yyyy' }}</td>
            <td class="acoes-buttons">
              <button class="btn-acao editar" (click)="editar(simulado.id)">Editar</button>
              <button class="btn-acao excluir" (click)="excluir(simulado.id)">Excluir</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <footer class="opcoes-extras">
      <nav class="nav-links">
        <a (click)="voltar()" role="button" class="link-voltar">← Voltar para Home</a>
      </nav>
    </footer>
  </main>
</div>
